
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ocean Home</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
color:white;
background:#001a2d;
}

/* วิดีโอพื้นหลัง */

.bg-video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

/* เงา */

.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
z-index:-1;
}

/* ฟองอากาศ */

.bubble{
position:absolute;
bottom:-40px;
width:12px;
height:12px;
border-radius:50%;
background:white;
opacity:0.8;
animation:bubbleUp linear forwards;
}

@keyframes bubbleUp{
0%{transform:translateY(0)}
100%{transform:translateY(-110vh)}
}

/* วาฬ */

.whale{
position:absolute;
top:55%;
left:-250px;
font-size:110px;
animation:whaleSwim 30s linear infinite;
}

@keyframes whaleSwim{
0%{left:-250px}
100%{left:110%}
}

/* ปลา */

.fish{
position:absolute;
top:35%;
left:-120px;
font-size:28px;
animation:fishSwim 20s linear infinite;
}

@keyframes fishSwim{
0%{left:-120px}
100%{left:110%}
}

/* ปลาหมึก */

.octopus{
position:absolute;
bottom:12%;
right:-200px;
font-size:75px;
filter:drop-shadow(0 0 25px cyan);
animation:octoSwim 26s linear infinite;
}

@keyframes octoSwim{
0%{right:-200px}
100%{right:110%}
}

/* กล่องเมนู */

.menu-box{

width:460px;
padding:50px;
text-align:center;

background:rgba(255,255,255,0.15);

border-radius:30px;

backdrop-filter:blur(16px);

border:1px solid rgba(255,255,255,0.3);

box-shadow:
0 0 45px rgba(0,200,255,0.4),
inset 0 0 20px rgba(255,255,255,0.3);

animation:floatBox 6s ease-in-out infinite;
}

@keyframes floatBox{
0%{transform:translateY(0)}
50%{transform:translateY(-15px)}
100%{transform:translateY(0)}
}

h1{
font-size:42px;
margin-bottom:30px;
text-shadow:0 0 20px cyan;
}

/* ปุ่มเมนู */

.menu-btn{

display:block;
width:100%;
margin:12px 0;

padding:15px;

border:none;
border-radius:30px;

background:linear-gradient(45deg,#00eaff,#008cff);

color:white;
font-size:18px;

cursor:pointer;

transition:0.3s;
}

.menu-btn:hover{
transform:scale(1.05);
box-shadow:0 0 20px cyan;
}

</style>
</head>

<body>

<!-- วิดีโอทะเล -->

<video class="bg-video" autoplay muted loop playsinline>
<source src="2.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="whale">🐳</div>

<div class="fish">🐟🐟🐟🐟🐟</div>

<div class="octopus">🐙</div>

<div class="menu-box">

<h1>🌊 Ocean World</h1>

<button class="menu-btn" onclick="window.location.href='movie.html'">
🎬 ดูหนัง
</button>

<button class="menu-btn"onclick="window.location.href='gallery.html'">
📸 แกลเลอรี่</button>

<button class="menu-btn"onclick="window.location.href='music.html'"
>🎵 เพลง</button>

<button class="menu-btn"onclick="window.location.href='settings.html'"
>⚙️ ตั้งค่า</button>

<button class="menu-btn"onclick="window.location.href='logout.html'"
>🚪 ออกจากระบบ</button>

</div>

<script>

/* ฟองอากาศ */

function bubble(){

let b=document.createElement("div");

b.className="bubble";

b.style.left=Math.random()*window.innerWidth+"px";
b.style.animationDuration=4+Math.random()*3+"s";

document.body.appendChild(b);

setTimeout(()=>{
b.remove();
},7000);

}

setInterval(bubble,400);

</script>

</body>
</html>

```html
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Movie Player</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:black;
color:white;
overflow:hidden;
}

/* VIDEO PLAYER */

.video-player{
position:relative;
width:100%;
height:100vh;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

/* CONTROLS */

.controls{

position:absolute;
bottom:20px;
left:50%;

transform:translateX(-50%);

background:rgba(0,0,0,0.6);

backdrop-filter:blur(10px);

padding:15px 25px;

border-radius:30px;

display:flex;
gap:15px;

align-items:center;

}

/* BUTTON */

button{

border:none;

padding:10px 18px;

border-radius:20px;

background:linear-gradient(45deg,#00eaff,#008cff);

color:white;

cursor:pointer;

font-size:15px;

transition:0.3s;

}

button:hover{

transform:scale(1.1);
box-shadow:0 0 10px cyan;

}

/* BACK BUTTON */

.back{

position:absolute;

top:20px;
left:20px;

background:rgba(255,255,255,0.2);

backdrop-filter:blur(10px);

}

/* PROGRESS */

.progress{

width:200px;

}

</style>
</head>

<body>

<div class="video-player">

<button class="back" onclick="goBack()">⬅ กลับ</button>

<video id="movie">
<source src="cinnamoroll2.mp4" type="video/mp4">
</video>

<div class="controls">

<button onclick="playPause()">▶️ / ⏸</button>

<input type="range" id="progress" class="progress" value="0">

<button onclick="mute()">🔊</button>

<button onclick="full()">⛶</button>

</div>

</div>

<script>

let video=document.getElementById("movie")
let progress=document.getElementById("progress")

function playPause(){

if(video.paused){
video.play()
}else{
video.pause()
}

}

function mute(){

video.muted=!video.muted

}

function full(){

video.requestFullscreen()

}

video.ontimeupdate=function(){

progress.value=(video.currentTime/video.duration)*100

}

progress.oninput=function(){

video.currentTime=(progress.value/100)*video.duration

}

function goBack(){

window.history.back()

}

</script>

</body>
</html>
```

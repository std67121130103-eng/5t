<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Logout</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

/* video background */

.bg-video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-3;
}

/* overlay */

.overlay{
position:fixed;
width:100%;
height:100%;
background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,60,0.9));
z-index:-2;
}

/* glow water */

.glow{
position:absolute;
width:100%;
height:100%;
background:radial-gradient(circle at 50% 0%,rgba(0,200,255,0.4),transparent);
animation:water 6s infinite alternate;
z-index:-1;
}

@keyframes water{
0%{transform:translateY(-20px)}
100%{transform:translateY(20px)}
}

/* logout box */

.box{

width:420px;
padding:50px;
text-align:center;

background:rgba(255,255,255,0.12);
border-radius:30px;

backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,0.3);

box-shadow:
0 0 40px rgba(0,200,255,0.4),
inset 0 0 25px rgba(255,255,255,0.2);

animation:float 5s ease-in-out infinite;

}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-12px)}
100%{transform:translateY(0)}
}

/* title */

h1{
font-size:40px;
margin-bottom:15px;
text-shadow:0 0 20px cyan;
}

p{
opacity:0.9;
margin-bottom:25px;
}

/* buttons */

.btn{

padding:14px 28px;
margin:10px;
border:none;
border-radius:30px;
font-size:16px;
cursor:pointer;
transition:0.3s;

}

.logout{
background:linear-gradient(45deg,#ff4b4b,#ff0000);
color:white;
}

.cancel{
background:rgba(255,255,255,0.2);
color:white;
}

.btn:hover{
transform:scale(1.08);
box-shadow:0 0 15px white;
}

/* whale */

.whale{
position:absolute;
top:60%;
left:-300px;
font-size:100px;
animation:whale 25s linear infinite;
}

@keyframes whale{
0%{left:-300px}
100%{left:110%}
}

/* octopus */

.octopus{
position:absolute;
bottom:15%;
right:-200px;
font-size:70px;
filter:drop-shadow(0 0 20px cyan);
animation:octo 30s linear infinite;
}

@keyframes octo{
0%{right:-200px}
100%{right:110%}
}

/* bubbles */

.bubble{
position:absolute;
bottom:-40px;
width:12px;
height:12px;
border-radius:50%;
background:white;
opacity:0.8;
animation:bubbleUp linear forwards;
}

@keyframes bubbleUp{
0%{transform:translateY(0)}
100%{transform:translateY(-110vh)}
}

/* dive effect */

.dive{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#001a2d;
z-index:9999;
transform:translateY(-100%);
transition:1.5s;
}

</style>
</head>

<body>

<video class="bg-video" autoplay muted loop>
<source src="sea.mp4" type="video/mp4">
</video>

<div class="overlay"></div>
<div class="glow"></div>

<div class="whale">🐳</div>
<div class="octopus">🐙</div>

<div class="box">

<h1>🚪 Logout</h1>

<p>คุณต้องการออกจากระบบหรือไม่?</p>

<button class="btn logout" onclick="logout()">ออกจากระบบ</button>

<button class="btn cancel" onclick="cancel()">ยกเลิก</button>

</div>

<div class="dive" id="dive"></div>

<script>

/* bubbles */

function bubble(){

let b=document.createElement("div")

b.className="bubble"

b.style.left=Math.random()*window.innerWidth+"px"
b.style.animationDuration=4+Math.random()*3+"s"

document.body.appendChild(b)

setTimeout(()=>{
b.remove()
},7000)

}

setInterval(bubble,400)

/* logout */

function logout(){

let dive=document.getElementById("dive")

dive.style.transform="translateY(0)"

setTimeout(()=>{

window.location.href="index.html"

},1600)

}

/* cancel */

function cancel(){

window.location.href="home.html"

}

</script>

</body>
</html>

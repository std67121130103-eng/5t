<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ดูหนัง 🎬</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
color:white;
overflow-x:hidden;
background:black;
}

/* VIDEO BACKGROUND */

.bg-video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-3;
}

/* overlay */

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,60,0.9));
z-index:-2;
}

/* bubble */

.bubble{
position:absolute;
bottom:-50px;
width:10px;
height:10px;
background:white;
border-radius:50%;
opacity:0.7;
animation:bubbleUp linear forwards;
}

@keyframes bubbleUp{
0%{transform:translateY(0)}
100%{transform:translateY(-120vh)}
}

/* header */

header{
padding:40px;
text-align:center;
font-size:42px;
text-shadow:0 0 20px cyan;
}

/* movie grid */

.movies{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:35px;

padding:40px;

max-width:1300px;

margin:auto;

}

/* card */

.movie{

background:rgba(255,255,255,0.08);

backdrop-filter:blur(15px);

border-radius:20px;

overflow:hidden;

cursor:pointer;

transition:0.4s;

box-shadow:0 10px 30px rgba(0,0,0,0.8);

}

.movie:hover{

transform:scale(1.08);

box-shadow:0 0 30px cyan;

}

/* video card */

.movie video{

width:100%;

height:320px;

object-fit:cover;

display:block;

}

/* title */

.movie h3{

padding:15px;

text-align:center;

font-size:20px;

}

/* back */

.back{

position:fixed;

top:20px;

left:20px;

padding:12px 25px;

border:none;

border-radius:30px;

background:rgba(255,255,255,0.2);

color:white;

cursor:pointer;

backdrop-filter:blur(10px);

transition:0.3s;

}

.back:hover{

background:rgba(255,255,255,0.4);

}

/* loader */

.loader{

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:black;

display:flex;

justify-content:center;

align-items:center;

flex-direction:column;

z-index:9999;

}

.spinner{

width:80px;

height:80px;

border:8px solid rgba(255,255,255,0.2);

border-top:8px solid #00eaff;

border-radius:50%;

animation:spin 1s linear infinite;

}

@keyframes spin{

to{transform:rotate(360deg)}

}

.loader p{

margin-top:20px;

font-size:20px;

}

</style>
</head>

<body>

<!-- LOADING -->

<div class="loader" id="loader">

<div class="spinner"></div>

<p>กำลังโหลดหนัง...</p>

</div>

<!-- VIDEO BACKGROUND -->

<video class="bg-video" autoplay muted loop>

<source src="sea.mp4" type="video/mp4">

</video>

<div class="overlay"></div>

<button class="back" onclick="back()">← กลับ</button>

<header>🎬 เลือกหนังที่อยากดู</header>

<div class="movies">

<div class="movie" onclick="play('movie1.html')">

<video autoplay muted loop playsinline>
<source src="1.mp4" type="video/mp4">
</video>

<h3>ซินนาโมโรลเต้นกับผองเพื่อน _ เฮลโลคิตตี้ก</h3>

</div>

<div class="movie" onclick="play('movie2.html')">

<video autoplay muted loop playsinline>
<source src="4.mp4" type="video/mp4">
</video>

<h3>เซอร์ไพรส์จากหอยทากของเครอปปี้ตอนที่ 2 _ เฮ</h3>

</div>


</div>

</div>

</div>

<script>

/* loading start */

window.onload=function(){

setTimeout(()=>{

document.getElementById("loader").style.display="none"

},1500)

}

/* bubble */

function bubble(){

let b=document.createElement("div")

b.className="bubble"

b.style.left=Math.random()*window.innerWidth+"px"

b.style.animationDuration=4+Math.random()*3+"s"

document.body.appendChild(b)

setTimeout(()=>{

b.remove()

},7000)

}

setInterval(bubble,400)

/* play movie */

function play(page){

let loader=document.getElementById("loader")

loader.style.display="flex"

setTimeout(()=>{

window.location.href=page

},1200)

}

/* back */

function back(){

window.location.href="home.html"

}

</script>

</body>
</html>
